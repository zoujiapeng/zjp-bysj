<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的第一个网页</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    main {
      width: min(92%, 560px);
      padding: 48px 32px;
      text-align: center;
      background: white;
      border-radius: 20px;
      box-shadow: 0 16px 50px rgba(15, 23, 42, 0.12);
    }
    h1 { margin: 0 0 16px; font-size: clamp(32px, 7vw, 52px); }
    p { margin: 0 0 28px; line-height: 1.7; color: #64748b; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <main>
    <h1>你好，GitHub</h1>
    <p>这是一个只使用 HTML、CSS 和少量 JavaScript 制作的超级简单网页。</p>
    <button id="button">点我一下</button>
  </main>

  <script>
    const button = document.querySelector('#button');
    button.addEventListener('click', () => {
      button.textContent = '你点击成功了';
    });
  </script>
</body>
</html>
